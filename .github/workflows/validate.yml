# This is a basic workflow to help you get started with Actions
name: Format & Validate

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  esphome-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Step 1: Create a dummy secrets file to satisfy dependencies
      - name: Create mock secrets.yaml
        run: |
          cat <<EOF > secrets.yaml
          wifi_ssid: "Mock-SSID"
          wifi_password: "Mock-Password"
          api_encryption_key: "dummy_key_must_be_32_bytes_long="
          EOF

      # Step 2: Validate all YAML files in the repo
      - name: Run ESPHome Valaidate
        uses: esphome/build-action@v7
        with:
          version: latest
          # This will look for all .yaml files in the root or a 'devices' folder
          yaml-file: "*.yaml"
